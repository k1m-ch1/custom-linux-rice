persistence = ["^(master|main|trunk)$"]
order = [
    "^tags/.*$",
    "^(master|main|trunk)$",
]

[terminal_colors]
matches = [
    [
    "^(master|main|trunk)$",
    ["bright_blue"],
],
    [
    "^tags/.*$",
    ["bright_green"],
],
]
unknown = [
    "bright_yellow",
    "bright_green",
    "bright_red",
    "bright_magenta",
    "bright_cyan",
]

[svg_colors]
matches = [
    [
    "^(master|main|trunk)$",
    ["blue"],
],
    [
    "^tags/.*$",
    ["green"],
],
]
unknown = [
    "orange",
    "green",
    "red",
    "purple",
    "turquoise",
]
